name: Compile Full Thesis
on: workflow_dispatch

permissions:
  contents: write
  pull-requests: write

jobs:
  draft_release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.date.outputs.version }}
      body: ${{ steps.release_drafter.outputs.body }}
    steps:
      - name: Get current date
        id: date
        run: |
          VERSION=$(date "+%Y.%m.%d")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version set to ${VERSION}"
      - uses: release-drafter/release-drafter@v6
        id: release_drafter
        with:
          tag: ${{ steps.date.outputs.version }}
          name: ${{ steps.date.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tagged-release:
    name: "Tagged Release"
    needs: draft_release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Cache LaTeX auxiliary files
        uses: actions/cache@v4
        with:
          path: |
            **/*.aux
            **/*.bbl
            **/*.blg
            **/*.toc
            **/*.out
            **/*.lof
            **/*.lot
            **/*.fls
            **/*.fdb_latexmk
          key: ${{ runner.os }}-latex-cache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-latex-cache-

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: thesis.tex
          compiler: arara
          args: "--log"
          texlive_version: 2024



      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: LaTeX-Compilation-Logs
          path: "*.log"

      - name: Rename file full
        env:
          TAG_NAME: ${{ needs.draft_release.outputs.tag_name }}
        run: mv thesis_full.pdf thesis_full-${TAG_NAME}.pdf

      - name: Upload PDF file
        uses: actions/upload-artifact@v4
        with:
          name: PDF
          path: |
           thesis-${{ needs.draft_release.outputs.tag_name }}.pdf
           word_count.html
           arara.log

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.draft_release.outputs.tag_name }}
          body: ${{ needs.draft_release.outputs.body }}
          make_latest: true
          files: |
            thesis-${{ needs.draft_release.outputs.tag_name }}.pdf
            word_count.html
            arara.log
