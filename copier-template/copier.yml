_min_copier_version: "9.0.0"
_subdirectory: template
# Copier renders copier.yml itself and every template file with the same Jinja
# environment. The default {{ }} / {% %} delimiters collide with LaTeX's own
# curly braces (e.g. \newcommand{\myTitle}{...}), so the whole template -
# including the validators below - uses the LaTeX-friendly delimiters instead.
_envops:
  block_start_string: "\\BLOCK{"
  block_end_string: "}"
  variable_start_string: "\\VAR{"
  variable_end_string: "}"
  comment_start_string: "\\#{"
  comment_end_string: "}"
  line_statement_prefix: "%%"
  line_comment_prefix: "%#"
  trim_blocks: true
  autoescape: false

_message_after_copy: |
  Your thesis project has been generated.

  Next steps:
    1. Open the folder in Overleaf, TeXstudio, or the included devcontainer.
    2. Compile `thesis.tex` with arara (see .araraconfig.yaml) to check everything builds.
    3. Start replacing the placeholder text in `text/ch1.tex` .. `text/ch7.tex`.
    4. Run `copier update` later to pull template improvements into this project.

# -----------------------------------------------------------------------------
# Thesis and submission
# -----------------------------------------------------------------------------
project_title:
  type: str
  help: The full title of the thesis (as it will appear on the title page).
  default: Using Thinking Machines to Alleviate our Dependency on Guild Navigators
  validator: >-
    \BLOCK{ if not project_title.strip() }
    A thesis needs a title.
    \BLOCK{ endif }

submission_year:
  type: str
  help: Year of submission.
  default: "2026"
  validator: >-
    \BLOCK{ if not submission_year.strip() }
    Submission year is required.
    \BLOCK{ endif }

submission_month:
